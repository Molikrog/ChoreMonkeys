<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: siteHead('Register')}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">

        <h2 class="text-center mb-4">Create Account</h2>

        <p th:if="${errorMessage}" class="text-danger text-center">
            <span th:text="${errorMessage}"></span>
        </p>

        <p th:if="${successMessage}" class="text-success text-center">
            <span th:text="${successMessage}"></span>
        </p>

        <form th:action="@{/register}"
              method="post">

            <div class="mb-3">
                <input type="text" name="username" placeholder="Username"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" placeholder="Password"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" placeholder="Email"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <select name="userType" class="form-select" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="WORKER">Worker</option>
                    <option value="EMPLOYER">Employer</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up</button>

        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a th:href="@{/login}" class="text-primary">Login</a>
        </p>

    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

</body>
</html>
