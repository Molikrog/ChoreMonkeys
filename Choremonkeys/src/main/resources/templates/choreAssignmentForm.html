<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!--@thymesVar id="assignment" type="com.example.choremonkeys.models.ChoreAssignment"-->
<!--@thymesVar id="chores" type="java.util.List<com.example.choremonkeys.models.Chore>"-->

<main class="container py-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">

        <h2 class="mb-4"
            th:text="${assignment?.id != null} ? 'Edit Assignment' : 'Create Assignment'">
        </h2>

        <form th:action="@{${assignment?.id == null ? '/dashboard/assignmentCreate' : '/dashboard/assignment/' + assignment.id}}"
              method="post">

            <input type="hidden" name="id"
                   th:if="${assignment?.id != null}"
                   th:value="${assignment.id}">

            <div class="mb-3">
                <label class="form-label">Chore</label>
                <select name="choreId" class="form-select" required>
                    <option value="" disabled selected>Select a chore</option>
                    <option th:each="chore : ${chores}"
                            th:value="${chore.choreId}"
                            th:text="${chore.title}"
                            th:selected="${assignment?.chore != null and assignment.chore.choreId == chore.choreId}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Deadline</label>
                <input type="datetime-local"
                       name="deadline"
                       class="form-control"
                       th:value="${assignment?.id != null} ? ${#temporals.format(assignment.localDateTime, 'yyyy-MM-dd''T''HH:mm')}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Max Workers</label>
                <input type="number"
                       name="max"
                       class="form-control"
                       placeholder="Maximum number of workers"
                       th:value="${assignment?.id != null} ? ${assignment.max} : 0">
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${assignment?.id != null} ? 'Update Assignment' : 'Create Assignment'">
                </button>
            </div>

        </form>
    </div>
</main>

</body>
</html>
