<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: siteHead('Login')}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">

        <h2 class="text-center mb-4">Login</h2>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <input type="password"
                       name="password"
                       placeholder="Password"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

        <p th:if="${param.error}" class="text-danger text-center mt-3">
            Invalid username or password
        </p>

        <p th:if="${param.logout}" class="text-success text-center mt-3">
            You have been logged out successfully
        </p>

        <p class="text-center text-sm mt-3">
            Don't have an account?
            <a href="/register" class="text-primary">Sign up</a>
        </p>

    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

</body>
</html>
